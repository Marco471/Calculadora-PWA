<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Marcos</title>

  <!-- Responsivo e sem zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
</head>
<body>

<div class="calc">
  <h2 id="mensagem">Dev Marcos 💻</h2>
  <p class="subtitulo">Calculadora JavaScript</p>

  <input type="text" id="display" value="0" readonly>

  <div class="grid">
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">/</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">*</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">-</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button class="igual" onclick="calcular()">=</button>
    <button onclick="add('+')">+</button>

    <button onclick="limpar()">C</button>
    <button onclick="backspace()">←</button>
    <button onclick="porcentagem()">%</button>
  </div>

  <p class="contato">
    Dev Marcos • 
    <a href="https://wa.me/5511991882423?text=Olá%20vi%20sua%20calculadora" target="_blank">
      WhatsApp
    </a>
  </p>
</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Marcos</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .clock-container {
      text-align: center;
      margin-bottom: 15px;
      padding: 15px 25px;
      background: #1e293b;
      border-radius: 15px;
      width: 320px;
      max-width: 95vw;
    }

    #clock {
      font-size: 2.2rem;
      font-weight: bold;
      color: #22c55e;
    }

    #date {
      font-size: 1rem;
      color: #ccc;
    }

    .calc {
      width: 320px;
      max-width: 95vw;
      background: #1e293b;
      border-radius: 15px;
      padding: 20px;
    }

    .display {
      width: 100%;
      height: 60px;
      background: #0f172a;
      color: #22c55e;
      font-size: 2rem;
      border-radius: 10px;
      text-align: right;
      padding: 10px;
      margin-bottom: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #475569;
    }

    /* OPERADORES */
    .operator {
      background: #22c55e;
      color: #022c22;
      font-weight: bold;
      font-size: 1.4rem;
      box-shadow: 0 0 10px rgba(34,197,94,0.5);
    }

    .operator:hover {
      background: #16a34a;
    }

    /* DESTAQUE DO + */
    .plus {
      background: #16a34a;
      font-size: 1.6rem;
    }

    /* BOTÃO C */
    .clear {
      background: #ef4444;
      color: white;
      font-weight: bold;
    }

    .whatsapp {
      margin-top: 15px;
    }

    .whatsapp a {
      text-decoration: none;
      background: #334155;
      color: #22c55e;
      padding: 10px 20px;
      border-radius: 50px;
    }
  </style>
</head>
<body>

<div class="clock-container">
  <div id="clock"></div>
  <div id="date"></div>
</div>

<div class="calc">
  <input type="text" id="display" class="display" value="0" readonly>

  <div class="buttons">
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button class="operator" onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button class="operator" onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button class="operator" onclick="add('-')">-</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button class="operator" onclick="calcular()">=</button>
    <button class="operator plus" onclick="add('+')">+</button>

    <button class="clear" onclick="limpar()">C</button>
  </div>
</div>

<div class="whatsapp">
  <a href="https://wa.me/5511991882423" target="_blank">
    Dev Marcos WhatsApp
  </a>
</div>

<script>
function atualizarRelogio() {
  const now = new Date();
  document.getElementById('clock').innerText =
    now.toLocaleTimeString('pt-BR');

  document.getElementById('date').innerText =
    now.toLocaleDateString('pt-BR', {
      weekday: 'long',
      day: 'numeric',
      month: 'long',
      year: 'numeric'
    });
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

const display = document.getElementById("display");

function add(v) {
  if (display.value === "0") display.value = "";
  display.value += v;
}

function calcular() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Erro";
  }
}

function limpar() {
  display.value = "0";
}
</script>

</body>
</html>

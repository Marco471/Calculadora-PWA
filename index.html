<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora + Relógio</title>

  <!-- Evita cache do navegador -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- CSS com versionamento para evitar cache -->
  <link rel="stylesheet" href="style.css?v=3">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 10px;
    }

    /* RELÓGIO */
    .clock-container {
      text-align: center;
      margin-bottom: 20px;
      padding: 15px 25px;
      background: #1e293b;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      width: 320px;
      max-width: 95vw;
    }

    #clock {
      font-size: 2.5rem;
      font-weight: bold;
      color: #22c55e; /* verde */
    }

    #date {
      font-size: 1.2rem;
      color: #ffffffa0;
      margin-top: 5px;
    }

    /* CALCULADORA */
    .calc {
      width: 320px;
      max-width: 95vw;
      background: #1e293b;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      padding: 20px;
      margin-bottom: 20px;
    }

    .display {
      width: 100%;
      height: 60px;
      background: #0f172a;
      color: #22c55e; /* verde */
      font-size: 2rem;
      border-radius: 10px;
      text-align: right;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 15px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .buttons button {
      padding: 18px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: #f1f5f9;
      cursor: pointer;
      transition: 0.2s;
    }

    .buttons button:hover {
      background: #475569;
      transform: scale(1.05);
    }

    .buttons .operator {
      background: #22c55e; /* verde */
      color: #1e293b;
      font-weight: bold;
    }

    .buttons .operator:hover {
      background: #16a34a; /* verde mais escuro */
    }

    /* WHATSAPP */
    .whatsapp {
      text-align: center;
    }

    .whatsapp a {
      text-decoration: none;
      background: #334155; /* tom sóbrio */
      color: #22c55e; /* verde */
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      display: inline-block;
      transition: 0.3s;
    }

    .whatsapp a:hover {
      background: #475569;
    }

    /* RESPONSIVO */
    @media (max-width: 400px) {
      #clock {
        font-size: 2rem;
      }
      .display {
        height: 50px;
        font-size: 1.5rem;
      }
      .buttons button {
        padding: 15px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- RELÓGIO NO TOPO -->
  <div class="clock-container">
    <div id="clock">00:00:00</div>
    <div id="date">Dia, 00 Mês 0000</div>
  </div>

  <!-- CALCULADORA -->
  <div class="calc">
    <input type="text" id="display" class="display" value="0" readonly>
    <div class="buttons">
      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('-')">-</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
      <button onclick="calculate()" class="operator">=</button>
      <button class="operator" onclick="clearDisplay()">C</button>
    </div>
  </div>

  <!-- BOTÃO WHATSAPP -->
  <div class="whatsapp">
    <a href="https://wa.me/5511991882423" target="_blank">Dev Marcos WhatsApp</a>
  </div>

  <script>
    // RELÓGIO
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2,'0');
      const minutes = String(now.getMinutes()).padStart(2,'0');
      const seconds = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

      const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
      const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      const dayName = days[now.getDay()];
      const dayNumber = now.getDate();
      const month = months[now.getMonth()];
      const year = now.getFullYear();
      document.getElementById('date').textContent = `${dayName}, ${dayNumber} ${month} ${year}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // CALCULADORA
    const display = document.getElementById('display');

    function appendValue(value) {
      if(display.value === '0') display.value = '';
      display.value += value;
    }

    function clearDisplay() {
      display.value = '0';
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = 'Erro';
      }
    }
  </script>

</body>
</html>
